section_emojis:
  work: "💻"
  skill_dev: "💡"
  communication: "🗣️"
  entertainment: "🎮"
  browse: "🌐"
  system: "⚙️"
  default: "📁"

categories:
  work:
    label: "💻 Work"
    priority: 10
    activities:
      - name: "Planning"
        keywords: 
          - "plan"
          - "docs"
          - ".md" 
          - "notion"
          - "jira"
          - "linear"
          - "implementation_plan"
      - name: "Coding"
        keywords: 
          - ".py"
          - ".ts"
          - ".js"
          - ".rs"
          - ".go"
          - ".java"
          - ".cpp"
          - "code"
          - "visual studio"
          - "debug"
      - name: "Research"
        keywords:
          - "GitHub"
          - "StackOverflow"
          - "Stack Overflow"
          - "Google"
          - "Search"
          - "ChatGPT"
          - "Claude"
          - "Gemini"
          - "DeepSeek"
          - "Qiita"
          - "Zenn"
    apps:
      - "code"
      - "devenv"
      - "terminal"
      - "windowsterminal"
      - "obsidian"
      - "antigravity"  # AI Assistant Tool
      - "powershell"
      - "cmd"

  skill_dev:
    label: "💡 Skill Dev"
    priority: 15
    activities:
      - name: "Competitive Programming"
        keywords:
          - "AtCoder"
          - "Algorithmic"
          - "Contest"
      - name: "Learning"
        keywords:
          - "tutorial"
          - "course"
          - "doc"
    apps: []

  communication:
    label: "🗣️ Communication"
    priority: 20
    activities:
      - name: "Meeting"
        keywords: ["meet", "zoom", "call"]
      - name: "Chat"
        keywords: ["chat", "slack", "discord", "teams"]
    apps:
      - "teams"
      - "slack"
      - "discord"
      - "outlook"
      - "thunderbird"

  entertainment:
    label: "🎮 Break"
    priority: 30
    activities:
      - name: "Gaming"
        keywords: ["game", "play", "steam", "tft", "league"]
      - name: "Video"
        keywords: ["youtube", "netflix", "twitch", "prime video"]
    apps:
      - "steam"
      - "riot client"
      - "league of legends"
      - "tft"
      - "spotify"
      - "vlc"

  browse:
    label: "🌐 Browse"
    priority: 40
    # Fallback for browsers if no specific keyword matches
    apps:
      - "floorp"
      - "chrome"
      - "msedge"
      - "firefox"
      - "brave"

  system:
    label: "⚙️ System"
    priority: 99
    apps:
      - "explorer"
      - "searchhost"
      - "lockapp"
      - "settings"
      - "taskmgr"
      - "startmenuexperiencehost"  # Windows Start Menu
      - "openwith"  # Open With dialog
